name: Build and Release

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  version:
    runs-on: windows-latest

    outputs:
      VERSION: ${{ steps.get_version.outputs.VERSION }}
      INFORMATIONAL_VERSION: ${{ steps.get_version.outputs.INFORMATIONAL_VERSION }}
      ASSEMBLY_VERSION: ${{ steps.get_version.outputs.ASSEMBLY_VERSION }}
      IS_MASTER: ${{ steps.get_version.outputs.IS_MASTER }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore src/SDRSharp.AudioRecorder/SDRSharp.AudioRecorder.csproj

    - name: Get version
      id: get_version
      shell: pwsh
      env:
        # Pass untrusted/ref inputs via env (not ${{ }} inlining) to avoid script injection.
        HEAD_REF: ${{ github.head_ref }}
        REF_NAME: ${{ github.ref_name }}
        COMMIT_SHA: ${{ github.sha }}
        RUN_NUMBER: ${{ github.run_number }}
      run: |
        $isMaster = $env:GITHUB_REF -eq 'refs/heads/master'

        # Single source of truth: <Version> in the .csproj.
        # A tag push (refs/tags/v*) may override it for ad-hoc releases.
        $csproj = "src/SDRSharp.AudioRecorder/SDRSharp.AudioRecorder.csproj"
        $csprojMatch = Select-String -Path $csproj -Pattern '<Version>\s*(.*?)\s*</Version>' | Select-Object -First 1
        if (-not $csprojMatch) {
          Write-Error "No <Version> element found in $csproj"
          exit 1
        }
        $csprojVersion = $csprojMatch.Matches[0].Groups[1].Value

        if ($env:GITHUB_REF -match 'refs/tags/v(.*)') {
          $version = $matches[1]
        } else {
          $version = $csprojVersion
        }

        # Assembly version is always a normalized 4-part major.minor.patch.0,
        # regardless of whether $version is 3- or 4-part.
        $coreParts = ($version -split '\.')
        $major = if ($coreParts.Length -gt 0) { [int]$coreParts[0] } else { 0 }
        $minor = if ($coreParts.Length -gt 1) { [int]$coreParts[1] } else { 0 }
        $patch = if ($coreParts.Length -gt 2) { [int]$coreParts[2] } else { 0 }
        $assemblyVersion = "$major.$minor.$patch.0"

        # InformationalVersion carries build metadata (sha / branch + run number).
        if ($isMaster) {
          $shortSha = "$env:COMMIT_SHA".Substring(0, 7)
          $informationalVersion = "$version+$shortSha"
        } else {
          $branchName = if ($env:HEAD_REF) { $env:HEAD_REF } else { $env:REF_NAME }
          $safeBranchName = $branchName -replace '[^a-zA-Z0-9-]', '-'
          $informationalVersion = "$version+$safeBranchName.$env:RUN_NUMBER"
        }

        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "INFORMATIONAL_VERSION=$informationalVersion" >> $env:GITHUB_OUTPUT
        echo "ASSEMBLY_VERSION=$assemblyVersion" >> $env:GITHUB_OUTPUT
        echo "IS_MASTER=$isMaster" >> $env:GITHUB_OUTPUT
        echo "Version (from $(if ($env:GITHUB_REF -match 'refs/tags/') { 'tag' } else { 'csproj' })): $version, Assembly: $assemblyVersion, Informational: $informationalVersion"

  build:
    runs-on: windows-latest
    needs: version
    strategy:
      fail-fast: false
      matrix:
        platform: [x86, x64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore src/SDRSharp.AudioRecorder/SDRSharp.AudioRecorder.csproj

    - name: Build
      shell: pwsh
      run: |
        $outputDir = "bin/Release/${{ matrix.platform }}/"

        $args = @(
          "src/SDRSharp.AudioRecorder/SDRSharp.AudioRecorder.csproj",
          "--configuration", "Release",
          "--no-restore",
          "/p:Platform=${{ matrix.platform }}",
          "/p:OutputPath=$outputDir",
          "/p:AppendTargetFrameworkToOutputPath=false",
          "/p:AppendRuntimeIdentifierToOutputPath=false",
          "/p:Version=${{ needs.version.outputs.VERSION }}",
          "/p:AssemblyVersion=${{ needs.version.outputs.ASSEMBLY_VERSION }}",
          "/p:FileVersion=${{ needs.version.outputs.ASSEMBLY_VERSION }}",
          "/p:InformationalVersion=${{ needs.version.outputs.INFORMATIONAL_VERSION }}"
        )

        if ("${{ needs.version.outputs.IS_MASTER }}" -eq "True") {
          $args += "/p:DebugSymbols=false"
          $args += "/p:DebugType=None"
        }

        dotnet build @args

    - name: Package DLLs
      shell: pwsh
      run: |
        $outputDir = "src/SDRSharp.AudioRecorder/bin/Release/${{ matrix.platform }}"
        $packageDir = "SDRSharp.AudioRecorder-${{ needs.version.outputs.VERSION }}-${{ matrix.platform }}"

        New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

        Copy-Item -Path (Join-Path $outputDir "SDRSharp.AudioRecorder.dll") -Destination $packageDir -Force

        if ("${{ needs.version.outputs.IS_MASTER }}" -ne "True" -and (Test-Path (Join-Path $outputDir "SDRSharp.AudioRecorder.pdb"))) {
          Copy-Item -Path (Join-Path $outputDir "SDRSharp.AudioRecorder.pdb") -Destination $packageDir -Force
        }

        Copy-Item -Path "SDRSharp.Common.dll" -Destination $packageDir -Force
        Copy-Item -Path "SDRSharp.PluginsCom.dll" -Destination $packageDir -Force
        Copy-Item -Path "SDRSharp.Radio.dll" -Destination $packageDir -Force

        if (Test-Path "README.md") {
          Copy-Item -Path "README.md" -Destination $packageDir -Force
        }

        if (Test-Path "changelog.txt") {
          Copy-Item -Path "changelog.txt" -Destination $packageDir -Force
        }

        Compress-Archive -Path "$packageDir/*" -DestinationPath "SDRSharp.AudioRecorder-${{ needs.version.outputs.VERSION }}-${{ matrix.platform }}.zip" -Force

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SDRSharp.AudioRecorder-${{ needs.version.outputs.VERSION }}-${{ matrix.platform }}
        path: SDRSharp.AudioRecorder-${{ needs.version.outputs.VERSION }}-${{ matrix.platform }}.zip
        retention-days: 90

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: windows-latest
    needs: [version, build]
    permissions:
      contents: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: SDRSharp.AudioRecorder-${{ needs.version.outputs.VERSION }}-*
        path: release-assets
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ needs.version.outputs.VERSION }}
        target_commitish: ${{ github.sha }}
        name: v${{ needs.version.outputs.VERSION }}
        files: release-assets/*.zip
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
